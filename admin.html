<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Адміністратора - OLMAX</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container { max-width: 1000px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .stats-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { flex: 1; background: #f8f9fa; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #eee; }
        .stat-card p { margin: 10px 0 0; font-size: 36px; font-weight: bold; color: #e63946; }
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; background: #f1f1f1; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #111; color: white; }
        .admin-form { display: grid; gap: 15px; }
        .admin-form input, .admin-form textarea, .admin-form select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; width: 100%; box-sizing: border-box; }
        .btn-primary { background: #e63946; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .admin-table th, .admin-table td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<header style="padding: 20px; background: #111; color: white; display: flex; justify-content: space-between; align-items: center;">
    <h1 style="margin: 0; font-size: 24px;">OLMAX ADMIN</h1>
    <nav>
        <a href="index.html" style="color: white; margin-right: 15px; text-decoration: none;">На головну</a>
        <a href="katalog.html" style="color: white; text-decoration: none;">Каталог</a>
    </nav>
</header>

<section class="admin-container">
    <div class="stats-grid">
        <div class="stat-card"><h3>🚗 Авто в базі</h3><p id="stat-cars">0</p></div>
        <div class="stat-card"><h3>📩 Заявки клієнтів</h3><p id="stat-apps">0</p></div>
    </div>

    <div class="admin-tabs">
        <button id="btn-catalog" class="tab-btn active" onclick="showSection('catalog')">Керування авто</button>
        <button id="btn-leads" class="tab-btn" onclick="showSection('leads')">Заявки</button>
    </div>

    <div id="section-catalog" class="admin-section">
        <h2>Додати автомобіль</h2>
        <form class="admin-form" onsubmit="addCar(event)">
            <input type="text" id="carTitle" placeholder="Марка та модель" required>
            <input type="text" id="carPrice" placeholder="Ціна (PLN)" required>
            
            <select id="carTransmission">
                <option value="Manualna">Механіка (Manualna)</option>
                <option value="Automatyczna">Автомат (Automatyczna)</option>
            </select>
            
            <input type="text" id="carEngine" placeholder="Об'єм двигуна (н-р: 12.8L)">
            <input type="file" id="carImages" multiple accept="image/*">
            <input type="number" id="carYear" placeholder="Рік випуску">
            <input type="text" id="carMileage" placeholder="Пробіг">
            <textarea id="carDesc" placeholder="Опис автомобіля..." rows="4"></textarea>

            <button type="submit" class="btn-primary">+ ЗБЕРЕГТИ АВТОМОБІЛЬ</button>
        </form>

        <h2 style="margin-top: 40px;">Список автомобілів</h2>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Назва</th>
                    <th>Ціна</th>
                    <th>Дія</th>
                </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
        </table>
    </div>

    <div id="section-leads" class="admin-section" style="display: none;">
        <h2>Отримані заявки клієнтів</h2>
        <div id="leads-list"></div>
    </div>
</section>

<script src="js/admin.js"></script>
</body>
</html>
